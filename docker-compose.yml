services:

  bot-gaming:
    build:
      context: ./bot
      dockerfile: Dockerfile
    image: gamebot-discord:latest
    container_name: gamebot-discord
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      OLLAMA_PRIMARY_URL: "http://ollama-main:11434"
      OLLAMA_BACKUP_URL: ${OLLAMA_BACKUP_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-60}
    depends_on:
      ollama-main:
        condition: service_healthy
    networks:
      - gaming-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama-main:
    image: ollama/ollama:latest
    container_name: ollama-main
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - gaming-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  ollama_data:
    name: gamebot_ollama_data

networks:
  gaming-net:
    name: gamebot_network
    driver: bridge
